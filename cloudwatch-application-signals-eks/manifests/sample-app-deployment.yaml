apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-api
  namespace: app-signals-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-api
  template:
    metadata:
      labels:
        app: sample-api
    spec:
      containers:
        - name: sample-api
          image: public.ecr.aws/docker/library/python:3.12-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --no-cache-dir flask==3.0.3 &&
              cat <<'PY' > /app.py
              from flask import Flask
              app = Flask(__name__)
              @app.get('/')
              def root():
                  return {'status': 'ok'}
              app.run(host='0.0.0.0', port=8080)
              PY
              python /app.py
          ports:
            - containerPort: 8080
