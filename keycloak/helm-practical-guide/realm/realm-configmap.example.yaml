apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{REALM_CONFIGMAP_NAME}}"
data:
  demo-realm.json: |
    {
      "realm": "demo",
      "enabled": true,
      "clients": [
        {
          "clientId": "demo-app",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "redirectUris": [
            "{{APP_REDIRECT_URI}}"
          ],
          "webOrigins": [
            "{{APP_WEB_ORIGIN}}"
          ]
        }
      ]
    }
